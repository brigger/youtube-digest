# youtube-digest — example config
# Copy to ~/.config/ytdigest/config.yaml and fill in your values.
# Run `ytdigest init` for an interactive setup wizard.

topics:
  - AI tools, models, and research breakthroughs
  - Developer tools and software releases
  - Tech industry news and events

sources:
  - url: https://www.youtube.com/@madymorrison
    type: youtube
    name: Mady Morrison
    count: 3
  - url: https://techcrunch.com
    type: website
    name: TechCrunch
    count: 10

# Optional: path to a YouTube cookies file (Netscape format).
# Required on cloud/VPS servers where YouTube blocks subtitle downloads.
# Export from your Mac with:
#   yt-dlp --cookies-from-browser chrome --skip-download https://youtube.com
# cookies_file: ~/.config/ytdigest/youtube-cookies.txt

email:
  from: you@gmail.com
  to:
    - you@gmail.com
    - colleague@example.com
  smtp_host: smtp.gmail.com
  smtp_port: 465        # 465 = SSL (recommended on Mac), 587 = STARTTLS (use on some VPS)
  smtp_user: you@gmail.com
  smtp_pass_env: GMAIL_PASSWORD   # reads password from this environment variable
  # smtp_pass: your-app-password  # alternative: inline (not recommended for shared machines)
